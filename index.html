<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stone,paperand scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Stone,papern and scissors game</h1>
    <div class="choices">
        <div class="choice" id="stone">
            <img src="stone.PNG" alt="stone">

        </div>
        <div class="choice" id="paper">
            <img src="paper.PNG" alt="paper">

        </div>
        <div class="choice" id="scissors">
            <img src="scissors.PNG" alt="scissors">

        </div>
    </div>
    <div class="score-board">
        <div id="user-score">
            <p id="userscore">
                0
            </p>
            <p>user-score</p>

        </div>
        <div id="computer-score">
            <p id="computerscore">
                0
            </p>
            <p>computer-score</p>
        </div>
    </div>
     <div class="play">
            <p id="msg">play your turn</p>
        </div>
    <script src="script.js"></script>
</body>
</html>
